; =============================================================================
;   Galaxy Classifier — Configuration File
;   CHANCES Project  |  Copyright (c) 2025 CHANCES Collaboration
; =============================================================================
;
;   Edit the [PATHS] section to point to your local image directories.
;   Everything else has sensible defaults for a first run.
;
;   Keys in [PATHS] must appear in the SAME ORDER as names in [CLASSES].
;   The first key receives label 0, the second label 1, and so on.
; =============================================================================

[PATHS]
; Absolute paths to each class folder.
; Replace the placeholder values with your actual directories.
galaxies = /path/to/your/images/galaxies
nothing  = /path/to/your/images/nothing
spurious = /path/to/your/images/spurious
offset   = /path/to/your/images/offset
stars    = /path/to/your/images/stars

[CLASSES]
; Class names — must be in the same order as the keys above.
names = galaxies, nothing, spurious, offset, stars

[TRAINING]
; Directory where checkpoints, CSVs and plots will be saved.
experiment_dir = ./experiment_results/

; Number of classes (must match the count of names in [CLASSES]).
num_classes = 5

; Square image size fed to the model (pixels).
img_size = 256

; Use single-channel greyscale images (true) or RGB (false).
greyscale = false

; Maximum training epochs (early stopping may end training sooner).
epochs = 30

; Batch size — reduce if you hit GPU out-of-memory errors.
batch_size = 32

; Accelerator: auto (GPU if available), cpu, or gpu.
accelerator = auto

; Early-stopping patience (epochs with no validation improvement).
patience = 10

; Devices: auto, or a specific GPU index e.g. 0 or 0,1.
devices = auto

; Fraction of data held out for testing (0.2 = 20 %).
test_size = 0.2

; Random seed for reproducibility.
random_state = 42

[INFERENCE]
; Path to a specific .ckpt file.
; Leave empty to auto-select the latest checkpoint in experiment_dir/checkpoints/.
checkpoint_path =

; Name of the predictions CSV saved inside experiment_dir.
output_name = predictions.csv

[CUSTOM_INFERENCE]
; Settings used by --step predict / inference_custom.py.
; All values can be overridden via command-line arguments.

; Subdirectory for custom prediction outputs (relative to experiment_dir).
; Leave empty to write to the current working directory.
output_dir =

; Prefix added to the output filename.
output_prefix = custom_predictions

; Scan sub-directories recursively (true / false).
recursive = false

; Batch size for inference.
batch_size = 32

; Device: auto, cpu, or gpu.
device = auto
